spring.application.name=profilcheck-backend
# ── SERVER ──────────────────────────────────────────
server.port=8080

# ── MYSQL ───────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/profilcheck_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ─────────────────────────────────────────────
app.jwt.secret=CHANGE_MOI_CLÉ_SECRÈTE_256_BITS_MINIMUM
app.jwt.expiration-ms=86400000

# ── OPENROUTER ──────────────────────────────────────
app.openrouter.api-key=REPLACE_WITH_YOUR_OPENROUTER_API_KEY
app.openrouter.base-url=https://openrouter.ai/api/v1
app.openrouter.model=google/gemini-2.0-flash-exp:free
app.openrouter.max-tokens=400

# ── EXAM ────────────────────────────────────────────
app.exam.duration-minutes=45
app.exam.questions-count=15